# Single source of truth for a run. Loaded by app/config.py (pydantic settings).
# Everything here must let the core demo run with NO external services and NO API keys.

simulation:
  n_iterations: 20000
  candidates_per_decision: 30      # K candidate recipes the sampler draws per decision
  render_every: 2000               # render a real/mock email only every N iters (keep LLM out of hot path)
  seed: 42
  warmup_iterations: 0             # optional pure-exploration warmup before learning kicks in
  iters_per_day: 200               # logical "day" length used by guardrail frequency caps

holdout:
  fraction: 0.10                   # random-policy cohort that never learns; used for honest lift

objective:                         # reward = conversion_value - penalty ; cost fed to VW = -reward
  w_reply: 1.0
  w_meeting: 3.0
  w_click: 0.15
  w_unsub: 2.0
  w_complaint: 6.0                 # deliberately heavy: complaints burn the domain for everyone
  w_negreply: 1.0
  w_deliv_decay: 1.0

bandit:
  exploration: squarecb            # epsilon | squarecb | cover
  epsilon: 0.1
  gamma_scale: 100.0               # squarecb greediness scale (higher = greedier)
  gamma_exponent: 0.5             # squarecb greediness exponent
  cover: 5
  cb_type: mtr                     # mtr (squarecb requires mtr) | dr | ips
  learning_rate: 0.5
  power_t: 0.0
  interactions: ["CA"]             # cross Context x Action namespaces -> learns interactions
  quadratic: ["CA"]
  normalize: true
  epsilon_decay: false             # if true, epsilon shrinks as iterations grow
  epsilon_decay_floor: 0.01
  model_path: "vw_model.bin"

deliverability:
  domain_warmup: healthy           # healthy | warming | cold  (v1 fixed healthy)
  spf_dkim_dmarc: pass             # pass | partial | fail
  decay_per_complaint: 0.03        # how much each complaint erodes domain health (0..1)
  health_recovery_per_iter: 0.01   # proportional recovery so decay tracks current complaint rate
  placement_open_multiplier:       # how placement gates the open probability
    primary: 1.0
    promotions: 0.55
    spam: 0.08

guardrails:
  max_per_contact_per_day: 1
  max_per_contact_per_week: 3
  cooldown_after_n_nonengage: 4    # pause a sequence after N consecutive non-engagements
  complaint_rate_ceiling: 0.05     # run-level: pause all sending if complaint rate exceeds this
  max_sends_per_day_run: 1000000   # run-level cancellation threshold
  banned_lever_values: {}          # e.g. {subject_emoji: [true]} to hard-ban a lever value

rendering:
  provider: mock                   # mock | anthropic
  model: claude-3-5-sonnet-latest
  max_tokens: 700

storage:
  backend: sqlite                  # sqlite | memory
  path: "runs.db"
