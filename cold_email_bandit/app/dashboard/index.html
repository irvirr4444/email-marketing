<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cold Email Bandit — live</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0b1020; --card:#141a2e; --ink:#e6e9f2; --muted:#8b93a7; --blue:#3b82f6; --green:#22c55e; --gray:#6b7280; --red:#ef4444; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:18px 24px; border-bottom:1px solid #222a44; display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  h1 { font-size:18px; margin:0; }
  .muted { color:var(--muted); }
  .wrap { padding:20px 24px; display:grid; grid-template-columns:2fr 1fr; gap:18px; }
  .card { background:var(--card); border:1px solid #222a44; border-radius:12px; padding:16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 12px; }
  .full { grid-column:1 / -1; }
  .kpis { display:flex; gap:24px; flex-wrap:wrap; }
  .kpi b { display:block; font-size:22px; }
  .badge { padding:3px 10px; border-radius:999px; font-weight:600; font-size:12px; }
  .ok { background:rgba(34,197,94,.15); color:var(--green); }
  .bad { background:rgba(239,68,68,.15); color:var(--red); }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid #222a44; }
  th { color:var(--muted); font-weight:600; }
  .chk { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #1c2340; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; }
  code { color:#a5b4fc; }
</style>
</head>
<body>
<header>
  <h1>Cold Email Bandit</h1>
  <span class="muted">Vowpal Wabbit CB-ADF · synthetic ground truth</span>
  <span id="status" class="muted" style="margin-left:auto"></span>
</header>

<div class="wrap">
  <div class="card full">
    <h2>Learning curve — bandit vs random holdout vs oracle ceiling</h2>
    <canvas id="curve" height="90"></canvas>
  </div>

  <div class="card">
    <h2>Funnel (bandit)</h2>
    <canvas id="funnel" height="150"></canvas>
  </div>

  <div class="card">
    <h2>Recovery — is it actually learning?</h2>
    <div class="kpis" style="margin-bottom:12px">
      <div class="kpi"><span class="muted">% of oracle</span><b id="ratio">–</b></div>
      <div class="kpi"><span class="muted">lever match</span><b id="lever">–</b></div>
      <div class="kpi"><span class="muted">verdict</span><b><span id="verdict" class="badge">–</span></b></div>
    </div>
    <div id="checks"></div>
  </div>

  <div class="card full">
    <h2>Per-context recommended levers (interaction learning)</h2>
    <div id="levers"></div>
  </div>
</div>

<script>
const fmt = (x, d=3) => (x===null||x===undefined||isNaN(x)) ? "–" : (x>=0?"+":"") + Number(x).toFixed(d);

const curveChart = new Chart(document.getElementById('curve'), {
  type:'line',
  data:{ labels:[], datasets:[
    {label:'bandit', data:[], borderColor:'#3b82f6', backgroundColor:'transparent', tension:.25, pointRadius:0, borderWidth:2},
    {label:'holdout (random)', data:[], borderColor:'#9ca3af', backgroundColor:'transparent', tension:.25, pointRadius:0, borderWidth:2},
    {label:'oracle ceiling', data:[], borderColor:'#22c55e', borderDash:[6,4], backgroundColor:'transparent', pointRadius:0, borderWidth:1.5},
  ]},
  options:{ responsive:true, animation:false, scales:{ x:{ticks:{color:'#8b93a7'}}, y:{ticks:{color:'#8b93a7'}} }, plugins:{legend:{labels:{color:'#e6e9f2'}}} }
});

const funnelChart = new Chart(document.getElementById('funnel'), {
  type:'bar',
  data:{ labels:['deliv','primary','open','click','reply','positive','meeting'], datasets:[{label:'% of sends', data:[], backgroundColor:'#3b82f6'}]},
  options:{ responsive:true, animation:false, scales:{ x:{ticks:{color:'#8b93a7'}}, y:{ticks:{color:'#8b93a7'}} }, plugins:{legend:{display:false}} }
});

async function poll(){
  try {
    const [st, cv, fn, rc, lv] = await Promise.all([
      fetch('/api/status').then(r=>r.json()),
      fetch('/metrics/curve').then(r=>r.json()),
      fetch('/metrics/funnel').then(r=>r.json()),
      fetch('/metrics/recovery').then(r=>r.json()),
      fetch('/metrics/levers').then(r=>r.json()),
    ]);

    document.getElementById('status').textContent =
      `t=${st.t.toLocaleString()}/${st.target.toLocaleString()} · ${st.running?'training…':'done'} · oracle≈${fmt(st.oracle_ceiling)}`;

    const c = cv.curve;
    curveChart.data.labels = c.map(p=>p.t);
    curveChart.data.datasets[0].data = c.map(p=>p.bandit_rolling);
    curveChart.data.datasets[1].data = c.map(p=>p.holdout_rolling);
    curveChart.data.datasets[2].data = c.map(()=>cv.oracle_ceiling);
    curveChart.update();

    const pct = k => (fn[k]*100);
    funnelChart.data.datasets[0].data = [pct('delivered'),pct('primary'),pct('opened'),pct('clicked'),pct('replied'),pct('positive'),pct('meeting')];
    funnelChart.update();

    document.getElementById('ratio').textContent = (rc.ratio*100).toFixed(1)+'%';
    document.getElementById('lever').textContent = (rc.lever_match_rate*100).toFixed(0)+'%';
    const v = document.getElementById('verdict');
    v.textContent = rc.pass ? 'LEARNING' : 'in progress';
    v.className = 'badge ' + (rc.pass ? 'ok':'bad');
    const checks = rc.interactions || {};
    document.getElementById('checks').innerHTML = Object.entries(checks).map(([k,val])=>
      `<div class="chk"><span><span class="dot" style="background:${val?'#22c55e':'#ef4444'}"></span>${k}</span><span>${val?'✓':'✗'}</span></div>`).join('');

    const dims = lv.dimensions;
    const slices = lv.slices;
    let html = '<table><tr><th>lever</th>' + Object.keys(slices).map(s=>`<th>${s}</th>`).join('') + '</tr>';
    for (const d of dims){
      html += `<tr><td><code>${d}</code></td>` + Object.values(slices).map(rec=>`<td>${rec[d]}</td>`).join('') + '</tr>';
    }
    html += '</table>';
    document.getElementById('levers').innerHTML = html;
  } catch(e){ console.error(e); }
}
poll();
setInterval(poll, 2500);
</script>
</body>
</html>
